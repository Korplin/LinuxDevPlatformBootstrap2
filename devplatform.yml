---
# =============================================================================
# devplatform.yml
# Linux Developer Platform Bootstrap — Stage 2
#
# Repository : https://github.com/Korplin/LinuxDevPlatformBootstrap
# Target OS  : Debian 13 "trixie" amd64
# Run with   : ansible-playbook -K /tmp/devplatform.yml
#
# All tasks use ansible.builtin.* fully-qualified module names.
# The playbook is idempotent: every task is safe to run multiple times.
# =============================================================================

- name: Linux Developer Platform Bootstrap
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    # ── Real (non-root) user detection ──────────────────────────────────────
    # When the bootstrap script runs via sudo, SUDO_USER is set by sudo to the
    # original caller's username. We use this to install per-user tools
    # (nvm, oh-my-zsh, pipx tools) into the correct home directory.
    real_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
    real_home: "/home/{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"

    # Pinned versions — bump here to update
    nvm_version: "v0.40.1"       # https://github.com/nvm-sh/nvm/releases
    kubectl_version: "v1.32"     # https://kubernetes.io/releases/

  # ============================================================================
  # PRE-TASKS: sanity checks before the main task list begins
  # ============================================================================
  pre_tasks:

    - name: "[PRE] Assert that target is Debian 13 trixie"
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
          - ansible_distribution_release == "trixie"
        fail_msg: >
          This playbook requires Debian 13 (trixie).
          Detected: {{ ansible_distribution }} {{ ansible_distribution_release }}.
        success_msg: "Confirmed: Debian 13 (trixie)"
      # Reason: Hard-fail immediately if the OS is wrong rather than silently
      # corrupting a non-trixie system with trixie-specific APT sources.

    - name: "[PRE] Show real_user that will receive per-user configuration"
      ansible.builtin.debug:
        msg: "Per-user configuration target: '{{ real_user }}' (home: {{ real_home }})"

  # ============================================================================
  tasks:

    # ==========================================================================
    # SECTION 1 — APT SOURCES
    # ==========================================================================

    - name: "[APT] Write /etc/apt/sources.list with contrib, non-free, non-free-firmware"
      ansible.builtin.copy:
        dest: /etc/apt/sources.list
        owner: root
        group: root
        mode: "0644"
        content: |
          # Debian 13 (trixie) — managed by Ansible (devplatform.yml)
          # Main repository
          deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware
          deb-src http://deb.debian.org/debian trixie main contrib non-free non-free-firmware

          # Security updates
          deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware
          deb-src http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware

          # Stable point-release updates
          deb http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware
          deb-src http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware
      # Reason: Starting with Debian 12, non-free-firmware is a separate
      # component from non-free. Both must be listed explicitly to get
      # proprietary GPU drivers (non-free) AND hardware firmware blobs
      # such as wifi and microcode (non-free-firmware). contrib contains
      # packages that depend on non-free software.

    - name: "[APT] Create /etc/apt/keyrings directory"
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"
      # Reason: /etc/apt/keyrings is the Debian 12+ recommended directory for
      # per-repository GPG keys. The signed-by= apt option references files
      # here, providing better security than the old apt-key approach.

    - name: "[APT] Refresh package cache after sources.list update"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
      # Reason: cache_valid_time: 0 forces a full refresh. We must do this
      # immediately after writing sources.list, otherwise subsequent apt tasks
      # may operate on a stale cache that does not include the new components.

    # ==========================================================================
    # SECTION 2 — VM AND GPU DETECTION
    # ==========================================================================

    - name: "[DETECT] Install dmidecode and pciutils"
      ansible.builtin.apt:
        name:
          - dmidecode    # reads SMBIOS/DMI data for VM detection
          - pciutils     # provides lspci for GPU detection
        state: present

    - name: "[DETECT] Query system product name"
      ansible.builtin.shell:
        cmd: dmidecode -s system-product-name 2>/dev/null || echo "Unknown"
      register: _system_product
      changed_when: false
      failed_when: false
      # Reason: system-product-name returns "VirtualBox" on VirtualBox VMs
      # and "Standard PC (Q35...)" or similar on QEMU/KVM guests.

    - name: "[DETECT] Query system manufacturer"
      ansible.builtin.shell:
        cmd: dmidecode -s system-manufacturer 2>/dev/null || echo "Unknown"
      register: _system_manufacturer
      changed_when: false
      failed_when: false
      # Reason: KVM/QEMU guests report "QEMU" as the manufacturer even though
      # the product name does not contain "QEMU". Checking both gives reliable
      # detection across different hypervisor configurations.

    - name: "[DETECT] Query VGA adapter via lspci"
      ansible.builtin.shell:
        cmd: lspci | grep -i vga 2>/dev/null || echo ""
      register: _gpu_info
      changed_when: false
      failed_when: false
      # Reason: lspci | grep -i vga prints the graphics adapter line which
      # includes the vendor name (NVIDIA, AMD, Intel). We uppercase the output
      # in the set_fact below to simplify string matching.

    - name: "[DETECT] Derive platform and GPU boolean facts"
      ansible.builtin.set_fact:
        is_virtualbox: >-
          {{ 'VIRTUALBOX' in (_system_product.stdout | upper) or
             'VIRTUALBOX' in (_system_manufacturer.stdout | upper) }}
        is_kvm: >-
          {{ 'QEMU' in (_system_product.stdout | upper) or
             'QEMU' in (_system_manufacturer.stdout | upper) or
             'KVM'  in (_system_product.stdout | upper) or
             'KVM'  in (_system_manufacturer.stdout | upper) }}
        has_nvidia: >-
          {{ 'NVIDIA' in (_gpu_info.stdout | upper) }}
        has_amd: >-
          {{ 'AMD'     in (_gpu_info.stdout | upper) or
             'RADEON'  in (_gpu_info.stdout | upper) or
             'ADVANCED MICRO' in (_gpu_info.stdout | upper) }}
        has_intel_gpu: >-
          {{ 'INTEL' in (_gpu_info.stdout | upper) }}

    - name: "[DETECT] Print detection summary"
      ansible.builtin.debug:
        msg:
          - "Product    : {{ _system_product.stdout | trim }}"
          - "Manufacturer: {{ _system_manufacturer.stdout | trim }}"
          - "GPU line   : {{ _gpu_info.stdout | trim }}"
          - "VirtualBox : {{ is_virtualbox }}"
          - "KVM/QEMU   : {{ is_kvm }}"
          - "NVIDIA GPU : {{ has_nvidia }}"
          - "AMD GPU    : {{ has_amd }}"
          - "Intel GPU  : {{ has_intel_gpu }}"

    # ==========================================================================
    # SECTION 3 — GPU AND VIRTUALISATION DRIVERS
    # ==========================================================================

    - name: "[GPU] Install VirtualBox guest utilities"
      ansible.builtin.apt:
        name:
          - virtualbox-guest-utils   # shared folders, clipboard, drag-and-drop
          - virtualbox-guest-x11     # display integration and auto-resize
        state: present
      when: is_virtualbox
      # Reason: VirtualBox guest additions enable seamless mouse, shared
      # clipboard, dynamic screen resolution, and accelerated display inside
      # a VirtualBox VM. Physical GPU driver tasks are skipped when detected.

    - name: "[GPU] Install KVM/QEMU guest utilities"
      ansible.builtin.apt:
        name:
          - spice-vdagent            # copy-paste and auto-resize in SPICE sessions
          - qemu-guest-agent         # host↔guest communication channel
          - xserver-xorg-video-qxl   # QXL display driver for QEMU video card
        state: present
      when: is_kvm and not is_virtualbox
      # Reason: spice-vdagent provides clipboard integration in Virt-Manager
      # and other SPICE clients. qemu-guest-agent allows host commands such as
      # graceful shutdown. xserver-xorg-video-qxl is required for the QXL
      # virtual GPU that QEMU presents by default.

    - name: "[GPU] Install NVIDIA proprietary driver"
      ansible.builtin.apt:
        name:
          - nvidia-driver    # proprietary driver for GTX 500+ series
          - nvidia-settings  # GUI control panel for NVIDIA settings
        state: present
      when: has_nvidia and not is_virtualbox and not is_kvm
      register: _nvidia_install
      ignore_errors: true
      # Reason: nvidia-driver lives in non-free. ignore_errors: true prevents
      # a hard failure if a matching DKMS build is not available for the
      # running kernel; the nouveau blacklist task below only fires on success.

    - name: "[GPU] Blacklist nouveau (open-source NVIDIA driver)"
      ansible.builtin.copy:
        dest: /etc/modprobe.d/blacklist-nouveau.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by devplatform.yml — do not edit manually.
          # nouveau conflicts with the proprietary nvidia-driver.
          blacklist nouveau
          options nouveau modeset=0
      when:
        - has_nvidia
        - not is_virtualbox
        - not is_kvm
        - _nvidia_install is defined
        - _nvidia_install is succeeded
      # Reason: The proprietary NVIDIA driver and the open-source nouveau driver
      # cannot be loaded simultaneously. This modprobe configuration prevents
      # the kernel from loading nouveau at boot, which is required for the
      # proprietary driver to initialise correctly.

    - name: "[GPU] Install AMD GPU driver packages"
      ansible.builtin.apt:
        name:
          - firmware-amd-graphics        # GPU firmware blobs (required for amdgpu)
          - libgl1-mesa-dri              # OpenGL via Mesa (radeonsi driver)
          - xserver-xorg-video-amdgpu    # Xorg DDX driver for AMD graphics
        state: present
      when: has_amd and not is_virtualbox and not is_kvm
      # Reason: The amdgpu kernel driver requires firmware-amd-graphics to
      # initialise modern AMD GPUs. libgl1-mesa-dri provides the OpenGL stack.
      # xserver-xorg-video-amdgpu provides modesetting acceleration in Xorg.

    - name: "[GPU] Install Intel GPU driver packages"
      ansible.builtin.apt:
        name:
          - intel-media-va-driver   # VA-API hardware video acceleration
          - libgl1-mesa-dri         # OpenGL via Mesa (iris / i965 driver)
        state: present
      when: has_intel_gpu and not is_virtualbox and not is_kvm
      # Reason: intel-media-va-driver enables hardware decode/encode for
      # modern Intel iGPUs (Gen8+). libgl1-mesa-dri is the OpenGL provider.

    # ==========================================================================
    # SECTION 4 — WIRELESS AND HARDWARE FIRMWARE
    # ==========================================================================

    - name: "[FIRMWARE] Install wireless and general hardware firmware"
      ansible.builtin.apt:
        name:
          - firmware-linux          # generic Linux firmware bundle
          - firmware-linux-nonfree  # additional non-free firmware (GPU, etc.)
          - firmware-iwlwifi        # Intel WiFi (AX200, AX210, 8260, 8265…)
          - firmware-realtek        # Realtek NICs and WiFi adapters
          - firmware-atheros        # Qualcomm/Atheros WiFi
          - firmware-brcm80211      # Broadcom WiFi (common in ThinkPads, MBP)
        state: present
      # Reason: A developer workstation may be on any hardware. Shipping all
      # common wifi firmware ensures the system is usable on bare metal without
      # a separate post-install step. Unnecessary firmware packages do no harm.

    # ==========================================================================
    # SECTION 5 — KDE PLASMA DESKTOP
    # ==========================================================================

    - name: "[KDE] Install KDE Plasma, SDDM, plasma-nm, konsole, and Powerline fonts"
      ansible.builtin.apt:
        name:
          - kde-full                 # complete KDE Plasma metapackage
          - sddm                     # Simple Desktop Display Manager for KDE
          - plasma-nm                # NetworkManager applet for KDE Plasma
          - konsole                  # KDE terminal emulator
          - fonts-powerline          # required for agnoster zsh theme glyphs
        state: present
        install_recommends: true
      # Reason: kde-full pulls in the full KDE application suite including
      # Dolphin, Kate, Spectacle, KCalc, etc. plasma-nm provides the system
      # tray widget for managing wired and wireless connections via
      # NetworkManager. SDDM is the officially recommended display manager for
      # KDE Plasma; it reads /etc/sddm.conf.d/ for theming configuration.

    - name: "[KDE] Register sddm as the default display manager via debconf"
      ansible.builtin.debconf:
        name: sddm
        question: shared/default-x-display-manager
        value: sddm
        vtype: select
      # Reason: On Debian, the active display manager is tracked via debconf.
      # If multiple DMs are installed as dependencies (e.g., gdm3 from a GNOME
      # library), this selection ensures sddm wins. The update-alternatives
      # system reads this setting via dpkg-reconfigure.

    - name: "[KDE] Create /etc/sddm.conf.d/ directory"
      ansible.builtin.file:
        path: /etc/sddm.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "[KDE] Write sddm configuration (Breeze theme, no auto-login)"
      ansible.builtin.copy:
        dest: /etc/sddm.conf.d/kde_settings.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by devplatform.yml
          [Theme]
          Current=breeze

          [Autologin]
          Relogin=false
      # Reason: Breeze is the default KDE theme for sddm. Disabling Relogin
      # is a sensible security default for a developer workstation.

    - name: "[KDE] Enable sddm service (starts at next boot)"
      ansible.builtin.systemd:
        name: sddm
        enabled: true
        daemon_reload: true
      # Reason: We enable (not start) sddm here because the Xorg/Wayland
      # display server cannot be started from within an Ansible task. It will
      # start automatically after the required reboot.

    # ==========================================================================
    # SECTION 6 — GIT AND GIT TOOLING
    # ==========================================================================

    - name: "[GIT] Download GitHub CLI GPG key"
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
        owner: root
        group: root
        mode: "0644"
        force: false
      # Reason: force: false means the key is only downloaded if the file does
      # not already exist. Subsequent playbook runs skip this network request,
      # making the task idempotent and faster on re-runs.

    - name: "[GIT] Add GitHub CLI apt repository"
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64
          signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg]
          https://cli.github.com/packages stable main
        state: present
        filename: github-cli
        update_cache: true

    - name: "[GIT] Install git and git tooling"
      ansible.builtin.apt:
        name:
          - git          # core VCS
          - git-lfs      # Large File Storage extension
          - git-flow     # Vincent Driessen branching model commands
          - tig          # ncurses text-mode repository browser
          - gitk         # Tcl/Tk GUI history browser
          - gh           # official GitHub CLI from cli.github.com repo
        state: present

    - name: "[GIT] Initialise git-lfs system-wide"
      ansible.builtin.command:
        cmd: git lfs install --system
      changed_when: false
      # Reason: git lfs install --system writes smudge/clean filter hooks and
      # an lfs section to /etc/gitconfig. changed_when: false suppresses false
      # "changed" reports because git lfs install is always idempotent.

    - name: "[GIT] Set system-wide git config: core.autocrlf = input"
      ansible.builtin.command:
        cmd: git config --system core.autocrlf input
      changed_when: false
      # Reason: On Linux, input converts CRLF → LF on commit but never adds
      # CRLF to checked-out files. This is the correct setting for Linux
      # developers collaborating with Windows contributors.

    - name: "[GIT] Set system-wide git config: init.defaultBranch = main"
      ansible.builtin.command:
        cmd: git config --system init.defaultBranch main
      changed_when: false

    - name: "[GIT] Set system-wide git config: pull.rebase = false"
      ansible.builtin.command:
        cmd: git config --system pull.rebase false
      changed_when: false
      # Reason: pull.rebase = false makes git pull use a merge commit instead
      # of rebasing. This is the historical default and avoids surprising
      # novice users who may not understand rebasing semantics.

    # ==========================================================================
    # SECTION 7 — KVM VIRTUALISATION STACK
    # ==========================================================================

    - name: "[KVM] Install KVM virtualisation packages"
      ansible.builtin.apt:
        name:
          - qemu-kvm                 # KVM hypervisor and QEMU machine emulator
          - libvirt-daemon-system    # libvirtd system daemon
          - libvirt-clients          # virsh CLI and client libraries
          - virt-manager             # GTK GUI for managing VMs
          - virtinst                 # virt-install CLI for VM provisioning
          - virt-viewer              # lightweight SPICE/VNC VM console viewer
          - bridge-utils             # brctl for network bridging
          - ovmf                     # UEFI firmware for QEMU VMs
        state: present
      # Reason: ovmf provides TianoCore UEFI firmware, required to install
      # modern operating systems (Windows 11, Fedora with Secure Boot) inside
      # KVM guests. bridge-utils enables bridged networking for VMs so they
      # appear on the same network segment as the host.

    - name: "[KVM] Add {{ real_user }} to libvirt group"
      ansible.builtin.user:
        name: "{{ real_user }}"
        groups: libvirt
        append: true
      # Reason: Without libvirt group membership, the user receives
      # "permission denied" when connecting to the libvirt socket. append: true
      # is critical — omitting it would remove the user from all other groups.

    - name: "[KVM] Add {{ real_user }} to kvm group"
      ansible.builtin.user:
        name: "{{ real_user }}"
        groups: kvm
        append: true
      # Reason: The kvm group grants read/write access to /dev/kvm, the
      # kernel virtualisation device. Without it, hardware acceleration is
      # unavailable and VMs run entirely in software emulation (very slow).

    - name: "[KVM] Enable and start libvirtd service"
      ansible.builtin.systemd:
        name: libvirtd
        enabled: true
        state: started

    # ==========================================================================
    # SECTION 8 — FLATPAK WITH KDE DISCOVER
    # ==========================================================================

    - name: "[FLATPAK] Install Flatpak and KDE Discover Flatpak backend"
      ansible.builtin.apt:
        name:
          - flatpak                          # Flatpak runtime and CLI
          - plasma-discover-backend-flatpak  # Flatpak integration in KDE Discover
        state: present
      # Reason: plasma-discover-backend-flatpak integrates Flatpak into KDE's
      # graphical software centre (Discover), so students can browse and install
      # Flatpak apps without using the terminal.

    - name: "[FLATPAK] Add Flathub remote repository"
      ansible.builtin.command:
        cmd: >
          flatpak remote-add --if-not-exists
          flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      changed_when: false
      # Reason: --if-not-exists is the Flatpak-native idempotency guard; if
      # flathub is already registered this is a silent no-op. changed_when: false
      # suppresses spurious "changed" output on subsequent runs.

    # ==========================================================================
    # SECTION 9 — BRAVE BROWSER
    # ==========================================================================

    - name: "[BRAVE] Download Brave Browser GPG key"
      ansible.builtin.get_url:
        url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
        owner: root
        group: root
        mode: "0644"
        force: false
      # Reason: Brave publishes a pre-dearmored .gpg key. force: false makes
      # the download idempotent; the key is only re-fetched if absent.

    - name: "[BRAVE] Add Brave Browser apt repository"
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg]
          https://brave-browser-apt-release.s3.brave.com/ stable main
        state: present
        filename: brave-browser
        update_cache: true

    - name: "[BRAVE] Install Brave Browser"
      ansible.builtin.apt:
        name: brave-browser
        state: present

    # ==========================================================================
    # SECTION 10 — VISUAL STUDIO CODE
    # ==========================================================================

    - name: "[VSCODE] Download Microsoft GPG key (ASCII-armored)"
      ansible.builtin.get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: /tmp/microsoft.asc
        mode: "0644"
        force: true
      # Reason: force: true fetches a fresh copy each time. The .asc file is
      # ASCII-armored and must be dearmored to binary before apt can use it.

    - name: "[VSCODE] Dearmor Microsoft GPG key into /etc/apt/keyrings/"
      ansible.builtin.shell:
        cmd: >
          gpg --dearmor < /tmp/microsoft.asc
          > /etc/apt/keyrings/packages.microsoft.gpg
        creates: /etc/apt/keyrings/packages.microsoft.gpg
      # Reason: apt's signed-by= option requires a binary .gpg key file, not
      # an ASCII .asc file. The creates: guard prevents re-running if the
      # binary key already exists, making this task idempotent.

    - name: "[VSCODE] Add Visual Studio Code apt repository"
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64
          signed-by=/etc/apt/keyrings/packages.microsoft.gpg]
          https://packages.microsoft.com/repos/code stable main
        state: present
        filename: vscode
        update_cache: true

    - name: "[VSCODE] Install Visual Studio Code (.deb, not Flatpak or snap)"
      ansible.builtin.apt:
        name: code
        state: present

    # ==========================================================================
    # SECTION 11 — CURSOR IDE (AppImage)
    # ==========================================================================

    - name: "[CURSOR] Install libfuse2 (FUSE2 compatibility for AppImages)"
      ansible.builtin.apt:
        name: libfuse2
        state: present
      # Reason: Debian 12+ ships libfuse3 by default. Most AppImages — including
      # Cursor — are built against the older FUSE2 ABI and require libfuse2
      # to mount themselves at runtime. Both versions coexist without conflict.

    - name: "[CURSOR] Create /opt/cursor directory"
      ansible.builtin.file:
        path: /opt/cursor
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "[CURSOR] Download latest Cursor AppImage"
      ansible.builtin.get_url:
        url: https://download.cursor.sh/linux/appImage/x64
        dest: /opt/cursor/cursor.AppImage
        owner: root
        group: root
        mode: "0755"
        force: false
      # Reason: The Cursor download URL always redirects to the latest stable
      # release. force: false ensures the file is only downloaded if absent;
      # delete /opt/cursor/cursor.AppImage and re-run to upgrade Cursor.

    - name: "[CURSOR] Create Cursor .desktop entry for KDE application menu"
      ansible.builtin.copy:
        dest: /usr/share/applications/cursor.desktop
        owner: root
        group: root
        mode: "0644"
        content: |
          [Desktop Entry]
          Version=1.0
          Name=Cursor
          Comment=AI-powered Code Editor built on VS Code
          Exec=/opt/cursor/cursor.AppImage --no-sandbox %F
          Icon=code
          Type=Application
          Categories=Development;IDE;TextEditor;
          Terminal=false
          StartupWMClass=Cursor
          MimeType=text/plain;inode/directory;
      # Reason: The .desktop file registers Cursor in the KDE (freedesktop.org-
      # compliant) application launcher. --no-sandbox is required for AppImages
      # on systems where user namespaces are restricted (the default on Debian).
      # Icon=code reuses VS Code's installed icon since Cursor does not install
      # a system icon; this gives a recognisable icon in the app menu.

    # ==========================================================================
    # SECTION 12 — NODE.JS VIA NVM
    # ==========================================================================

    - name: "[NVM] Check if nvm is already installed for {{ real_user }}"
      ansible.builtin.stat:
        path: "{{ real_home }}/.nvm/nvm.sh"
      register: _nvm_stat

    - name: "[NVM] Install nvm {{ nvm_version }} for {{ real_user }}"
      ansible.builtin.shell:
        cmd: >
          curl -o-
          https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh
          | bash
        executable: /bin/bash
      become: true
      become_user: "{{ real_user }}"
      when: not _nvm_stat.stat.exists
      environment:
        HOME: "{{ real_home }}"
        NVM_DIR: "{{ real_home }}/.nvm"
      # Reason: nvm is a shell function, not a binary, and must be installed
      # per-user. We use become_user so the install script writes ~/.nvm into
      # the real user's home directory instead of /root. The install script
      # automatically appends init lines to ~/.bashrc; we add them to ~/.zshrc
      # manually in the Shell section below.

    - name: "[NVM] Install latest Node.js LTS via nvm"
      ansible.builtin.shell: |
        export NVM_DIR="{{ real_home }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        nvm install --lts
        nvm alias default node
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ real_user }}"
      environment:
        HOME: "{{ real_home }}"
        NVM_DIR: "{{ real_home }}/.nvm"
      register: _nvm_node_install
      changed_when: "'already installed' not in _nvm_node_install.stdout"
      # Reason: nvm.sh must be sourced because nvm is a shell function, not a
      # binary in PATH. nvm alias default node makes the LTS version active in
      # all new shell sessions without requiring 'nvm use' manually.

    - name: "[NVM] Install global npm packages"
      ansible.builtin.shell: |
        export NVM_DIR="{{ real_home }}/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        npm install -g pnpm yarn typescript ts-node nodemon http-server
      args:
        executable: /bin/bash
      become: true
      become_user: "{{ real_user }}"
      environment:
        HOME: "{{ real_home }}"
        NVM_DIR: "{{ real_home }}/.nvm"
      changed_when: false
      # Reason: These global packages are installed into the nvm-managed Node
      # prefix (not the system npm), so they stay isolated and are updated when
      # Node.js itself is updated via nvm. changed_when: false suppresses false
      # "changed" output because npm install -g always outputs something.

    # ==========================================================================
    # SECTION 13 — PYTHON AND TOOLING
    # ==========================================================================

    - name: "[PYTHON] Install Python system packages"
      ansible.builtin.apt:
        name:
          - python3        # Python 3 interpreter
          - python3-pip    # pip package installer
          - python3-venv   # venv module for virtual environments
          - python3-dev    # C header files for building Python extensions
          - pipx           # isolated application installer (PEP 668-safe)
        state: present
      # Reason: python3-dev is required to compile C extension modules (e.g.,
      # cryptography, psycopg2). pipx installs CLI tools in isolated virtualenvs,
      # respecting PEP 668 which prevents pip from modifying the system Python.

    - name: "[PYTHON] Ensure ~/.local/bin is on PATH in {{ real_user }}'s .profile"
      ansible.builtin.lineinfile:
        path: "{{ real_home }}/.profile"
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        state: present
        create: true
        mode: "0644"
      become: true
      become_user: "{{ real_user }}"
      # Reason: pipx installs tool binaries to ~/.local/bin. This path is
      # not guaranteed to be in PATH on a minimal Debian install. .profile is
      # sourced by login shells (bash, zsh with oh-my-zsh).

    - name: "[PYTHON] Install ansible-lint via pipx"
      ansible.builtin.command:
        cmd: pipx install ansible-lint
        creates: "{{ real_home }}/.local/pipx/venvs/ansible-lint"
      become: true
      become_user: "{{ real_user }}"
      environment:
        HOME: "{{ real_home }}"
        PIPX_HOME: "{{ real_home }}/.local/pipx"
        PIPX_BIN_DIR: "{{ real_home }}/.local/bin"
      # Reason: creates: points to the pipx virtualenv directory. If the
      # directory already exists, Ansible skips the task — a reliable and
      # cheap idempotency check that avoids calling 'pipx list'.

    - name: "[PYTHON] Install pre-commit via pipx"
      ansible.builtin.command:
        cmd: pipx install pre-commit
        creates: "{{ real_home }}/.local/pipx/venvs/pre-commit"
      become: true
      become_user: "{{ real_user }}"
      environment:
        HOME: "{{ real_home }}"
        PIPX_HOME: "{{ real_home }}/.local/pipx"
        PIPX_BIN_DIR: "{{ real_home }}/.local/bin"

    - name: "[PYTHON] Install cookiecutter via pipx"
      ansible.builtin.command:
        cmd: pipx install cookiecutter
        creates: "{{ real_home }}/.local/pipx/venvs/cookiecutter"
      become: true
      become_user: "{{ real_user }}"
      environment:
        HOME: "{{ real_home }}"
        PIPX_HOME: "{{ real_home }}/.local/pipx"
        PIPX_BIN_DIR: "{{ real_home }}/.local/bin"

    - name: "[PYTHON] Check if uv is already installed"
      ansible.builtin.stat:
        path: "{{ real_home }}/.local/bin/uv"
      register: _uv_stat

    - name: "[PYTHON] Install uv (modern Python package manager)"
      ansible.builtin.shell:
        cmd: curl -LsSf https://astral.sh/uv/install.sh | sh
        executable: /bin/bash
      become: true
      become_user: "{{ real_user }}"
      when: not _uv_stat.stat.exists
      environment:
        HOME: "{{ real_home }}"
      # Reason: uv is not yet packaged in Debian trixie. The official installer
      # downloads a static binary and places it at ~/.local/bin/uv. We check
      # for the binary first (via stat) so the task is skipped on re-runs.

    # ==========================================================================
    # SECTION 14 — CORE DEVOPS UTILITIES
    # ==========================================================================

    - name: "[DEVOPS] Install core DevOps utility packages"
      ansible.builtin.apt:
        name:
          # ── File and data utilities ──────────────────────────────────────
          - curl
          - wget
          - jq           # JSON processor
          - yq           # YAML/XML/TOML processor (Python wrapper for jq)
          - unzip
          - zip
          - tar
          - rsync
          # ── System monitoring ────────────────────────────────────────────
          - htop         # interactive process viewer
          - btop         # modern resource monitor with graphs
          - ncdu         # ncurses disk usage analyser
          - tree         # recursive directory listing
          # ── Terminal multiplexers ────────────────────────────────────────
          - tmux
          - screen
          # ── Network utilities ────────────────────────────────────────────
          - net-tools    # ifconfig, netstat (legacy but still useful)
          - nmap         # network scanner
          - traceroute
          - dnsutils     # dig, nslookup, host
          - whois
          # ── SSH ──────────────────────────────────────────────────────────
          - openssh-client
          - openssh-server
          # ── Build tools ──────────────────────────────────────────────────
          - build-essential  # gcc, g++, make, libc-dev
          - cmake
          - pkg-config
          # ── Container runtime ────────────────────────────────────────────
          - docker.io        # Docker CE engine from Debian repos
          - docker-compose   # multi-container orchestration tool
          # ── Ansible (ensure present; may have been installed from bootstrap) ─
          - ansible
        state: present

    - name: "[DEVOPS] Add {{ real_user }} to docker group"
      ansible.builtin.user:
        name: "{{ real_user }}"
        groups: docker
        append: true
      # Reason: Without docker group membership, every docker command requires
      # sudo. append: true is mandatory to avoid removing other group memberships.

    - name: "[DEVOPS] Enable and start Docker service"
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # ── kubectl ──────────────────────────────────────────────────────────────

    - name: "[KUBECTL] Download Kubernetes apt signing key"
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/{{ kubectl_version }}/deb/Release.key"
        dest: /tmp/kubernetes-release.key
        mode: "0644"
        force: true
      # Reason: force: true fetches a fresh copy so a key rotation is picked up.
      # The key is then dearmored in the next task.

    - name: "[KUBECTL] Dearmor Kubernetes GPG key"
      ansible.builtin.shell:
        cmd: >
          gpg --dearmor < /tmp/kubernetes-release.key
          > /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      # Reason: The creates: guard makes this idempotent — the dearmor step
      # is skipped if the binary key file already exists.

    - name: "[KUBECTL] Add Kubernetes apt repository"
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg]
          https://pkgs.k8s.io/core:/stable:/{{ kubectl_version }}/deb/ /
        state: present
        filename: kubernetes
        update_cache: true
      # Reason: Kubernetes publishes per-minor-version repositories. kubectl_version
      # in vars controls which version stream is tracked. Update that variable
      # and re-run the playbook to switch streams.

    - name: "[KUBECTL] Install kubectl"
      ansible.builtin.apt:
        name: kubectl
        state: present

    # ── Helm ─────────────────────────────────────────────────────────────────

    - name: "[HELM] Download Helm signing key"
      ansible.builtin.get_url:
        url: https://baltocdn.com/helm/signing.asc
        dest: /tmp/helm-signing.asc
        mode: "0644"
        force: true

    - name: "[HELM] Dearmor Helm GPG key"
      ansible.builtin.shell:
        cmd: >
          gpg --dearmor < /tmp/helm-signing.asc
          > /usr/share/keyrings/helm.gpg
        creates: /usr/share/keyrings/helm.gpg

    - name: "[HELM] Add Helm stable apt repository"
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/usr/share/keyrings/helm.gpg]
          https://baltocdn.com/helm/stable/debian/ all main
        state: present
        filename: helm-stable-debian
        update_cache: true

    - name: "[HELM] Install helm"
      ansible.builtin.apt:
        name: helm
        state: present

    # ==========================================================================
    # SECTION 15 — SHELL AND TERMINAL SETUP
    # ==========================================================================

    - name: "[SHELL] Install zsh"
      ansible.builtin.apt:
        name: zsh
        state: present

    - name: "[SHELL] Set zsh as default login shell for {{ real_user }}"
      ansible.builtin.user:
        name: "{{ real_user }}"
        shell: /bin/zsh
      # Reason: ansible.builtin.user writes directly to /etc/passwd, which is
      # both idempotent and does not require user interaction (unlike chsh which
      # prompts for a password and may fail inside Ansible's become context).

    - name: "[SHELL] Check if oh-my-zsh is already installed"
      ansible.builtin.stat:
        path: "{{ real_home }}/.oh-my-zsh"
      register: _ohmyzsh_stat

    - name: "[SHELL] Install oh-my-zsh (unattended, no shell switch)"
      ansible.builtin.shell:
        cmd: >
          sh -c "$(curl -fsSL
          https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
          "" --unattended
        executable: /bin/bash
      become: true
      become_user: "{{ real_user }}"
      when: not _ohmyzsh_stat.stat.exists
      environment:
        HOME: "{{ real_home }}"
        RUNZSH: "no"    # prevents the installer from exec-ing zsh immediately
        CHSH: "no"      # prevents a duplicate chsh call (we handle shell above)
      # Reason: RUNZSH=no is critical — without it, the oh-my-zsh installer
      # would exec zsh at the end of its script, hanging the Ansible task
      # indefinitely. CHSH=no avoids a redundant interactive shell change.

    - name: "[SHELL] Clone zsh-autosuggestions plugin"
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-autosuggestions
        dest: "{{ real_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
        version: master
        update: false
      become: true
      become_user: "{{ real_user }}"
      # Reason: update: false makes git clone a no-op if the directory already
      # exists, providing idempotency. Change to update: true to pull updates
      # on every run.

    - name: "[SHELL] Clone zsh-syntax-highlighting plugin"
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting
        dest: "{{ real_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
        version: master
        update: false
      become: true
      become_user: "{{ real_user }}"

    - name: "[SHELL] Set ZSH_THEME to agnoster in .zshrc"
      ansible.builtin.lineinfile:
        path: "{{ real_home }}/.zshrc"
        regexp: '^ZSH_THEME='
        line: 'ZSH_THEME="agnoster"'
        state: present
      become: true
      become_user: "{{ real_user }}"
      # Reason: agnoster is a Powerline-based theme that displays the current
      # git branch and working directory status in a visually clear format.
      # It requires fonts-powerline (installed in the KDE section) to render
      # arrow separators correctly.

    - name: "[SHELL] Enable plugins in .zshrc"
      ansible.builtin.lineinfile:
        path: "{{ real_home }}/.zshrc"
        regexp: '^plugins='
        line: "plugins=(git zsh-autosuggestions zsh-syntax-highlighting)"
        state: present
      become: true
      become_user: "{{ real_user }}"
      # Reason: oh-my-zsh activates plugins by reading the plugins=() array in
      # .zshrc. The git plugin adds aliases and VCS prompt info. The two community
      # plugins were cloned in the tasks above; they must be listed here to be
      # sourced at shell startup.

    - name: "[SHELL] Add nvm init block to .zshrc"
      ansible.builtin.blockinfile:
        path: "{{ real_home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK — nvm"
        block: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
        state: present
        create: true
      become: true
      become_user: "{{ real_user }}"
      # Reason: nvm's own install script adds init lines to ~/.bashrc but does
      # not touch ~/.zshrc. Without these lines, nvm and the node binary are
      # unavailable in zsh sessions. blockinfile uses marker comments to locate
      # and idempotently update the exact block on subsequent runs.

    - name: "[SHELL] Add ~/.local/bin to PATH in .zshrc"
      ansible.builtin.blockinfile:
        path: "{{ real_home }}/.zshrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK — local bin"
        block: |
          export PATH="$HOME/.local/bin:$PATH"
        state: present
        create: true
      become: true
      become_user: "{{ real_user }}"
      # Reason: pipx, uv, and pre-commit are installed to ~/.local/bin.
      # This block ensures those tools are found in every interactive zsh session
      # without requiring the user to manually edit .zshrc.

    # ==========================================================================
    # SECTION 16 — FINAL SYSTEM UPGRADE AND CLEANUP
    # ==========================================================================

    - name: "[FINAL] Full system upgrade (dist-upgrade)"
      ansible.builtin.apt:
        upgrade: full
        update_cache: true
      # Reason: A final full upgrade pulls in any security updates published
      # after the initial bootstrap. This ensures the machine is not left with
      # known vulnerabilities from the netinst ISO.

    - name: "[FINAL] Remove orphaned packages"
      ansible.builtin.apt:
        autoremove: true
        purge: true
      # Reason: kde-full and other large metapackages may introduce packages
      # that become orphaned once the metapackage itself is satisfied. Removing
      # them keeps the system clean.

    - name: "[FINAL] Print post-install instructions"
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - " ✔  Developer Platform Bootstrap — COMPLETE"
          - "════════════════════════════════════════════════════════════════"
          - ""
          - "  REQUIRED STEPS AFTER THIS PLAYBOOK:"
          - ""
          - "  1.  Reboot the machine:"
          - "        sudo reboot"
          - "      (Required for: GPU drivers, kernel modules, sddm, nouveau"
          - "       blacklist, FUSE changes, and all group memberships.)"
          - ""
          - "  2.  After reboot, KDE Plasma will launch via sddm."
          - "      Log in with your normal user credentials."
          - ""
          - "  3.  Open Konsole — your shell is now zsh with oh-my-zsh."
          - "      The agnoster theme requires a Powerline-capable font in"
          - "      Konsole settings (Fonts > Use Powerline font)."
          - ""
          - "  4.  Group memberships (docker, libvirt, kvm) become effective"
          - "      after the reboot / re-login."
          - ""
          - "  5.  Per-user tools available after opening a new zsh session:"
          - "        node, npm, npx, pnpm, yarn, tsc, ts-node, nodemon"
          - "        ansible-lint, pre-commit, cookiecutter (via pipx)"
          - "        uv  (~/.local/bin/uv)"
          - ""
          - "  6.  Set your git identity (per user, not system-wide):"
          - "        git config --global user.name  'Your Name'"
          - "        git config --global user.email 'you@example.com'"
          - ""
          - "  7.  Authenticate GitHub CLI:"
          - "        gh auth login"
          - ""
          - "════════════════════════════════════════════════════════════════"
