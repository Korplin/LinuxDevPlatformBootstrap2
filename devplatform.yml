          - "       sudo reboot"
          - "     Required for: GPU drivers, kernel modules, sddm,"
          - "     nouveau blacklist, and all group memberships."
          - ""
          - "  2. After reboot, KDE Plasma starts via sddm."
          - "     Log in with your normal user credentials."
          - ""
          - "  3. Open Konsole. Your shell is now zsh + oh-my-zsh."
          - "     In Konsole Settings → Fonts, select a Powerline-capable"
          - "     font (e.g., FiraCode Nerd Font or 'DejaVu Sans Mono')"
          - "     for the agnoster theme arrows to render correctly."
          - ""
          - "  4. Set your git identity (per-user, not system-wide):"
          - "       git config --global user.name  'Your Name'"
          - "       git config --global user.email 'you@example.com'"
          - ""
          - "  5. Authenticate the GitHub CLI:"
          - "       gh auth login"
          - ""
          - "  6. Group memberships active after reboot:"
          - "       docker, libvirt, kvm"
          - ""
          - "  7. Tools available in new zsh session:"
          - "       node  npm  pnpm  yarn  tsc  ts-node  nodemon"
          - "       ansible-lint  pre-commit  cookiecutter  uv"
          - "       kubectl  helm  k9s  cosign  yq  jq  fzf"
          - "       bat  eza  ripgrep (rg)  fd  age"
